apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent1
  namespace: petragentic
  labels:
    app: agent1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: agent1
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: agent1
          # IMAGE_TAG_PLACEHOLDER is replaced by sed in the deploy workflow
          image: us.icr.io/petragentic/agent1:IMAGE_TAG_PLACEHOLDER
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: agent1-config
            - secretRef:
                name: agent1-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
