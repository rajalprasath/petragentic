# gateway-secret template
# DO NOT commit real values. In CI/CD these are injected from IBM Secrets Manager.
# kubectl create secret generic gateway-secret --from-literal=...
apiVersion: v1
kind: Secret
metadata:
  name: gateway-secret
  namespace: petragentic
type: Opaque
stringData:
  APPID_ISSUER_URL: "<set-by-ci>"
  APPID_JWKS_URL: "<set-by-ci>"
  APPID_AUDIENCE: "<set-by-ci>"
