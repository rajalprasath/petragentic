apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrate
  namespace: petragentic
  labels:
    app: orchestrate
    app.kubernetes.io/part-of: petragentic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orchestrate
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: orchestrate
    spec:
      securityContext:
        runAsUser: 1001
        runAsNonRoot: true
        fsGroup: 1001
      containers:
        - name: orchestrate
          image: image-registry.openshift-image-registry.svc:5000/petragentic/orchestrate:latest
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef:
                name: orchestrate-config
            - secretRef:
                name: orchestrate-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
